{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Excluir Livro</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f5f0;
      --surface: #ffffff;
      --border: #e8e4db;
      --accent: #2c5f2e;
      --red: #c0392b;
      --red-lt: #fdf0ee;
      --text: #1a1a18;
      --muted: #888680;
      --radius: 12px;
      --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
    }

    .wrapper {
      width: 100%;
      max-width: 440px;
      animation: fadeUp 0.4s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: 3px solid var(--red);
      border-radius: var(--radius);
      padding: 2rem;
      box-shadow: var(--shadow);
      text-align: center;
    }

    .icon {
      width: 52px;
      height: 52px;
      background: var(--red-lt);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.25rem;
    }

    .card h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 0.5rem;
    }

    .card p {
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    .livro-nome {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      font-style: italic;
      color: var(--text);
      margin: 0.75rem 0 1.5rem;
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin-bottom: 1.5rem;
    }

    .btn-row {
      display: flex;
      gap: 0.75rem;
    }

    .btn {
      flex: 1;
      padding: 0.8rem;
      border-radius: var(--radius);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      text-decoration: none;
      text-align: center;
      transition: all 0.2s;
      cursor: pointer;
      border: none;
    }

    .btn-confirmar { background: var(--red); color: #fff; }
    .btn-confirmar:hover { background: #a93226; transform: translateY(-1px); }

    .btn-cancelar {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }

    .btn-cancelar:hover { border-color: var(--muted); color: var(--text); }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="card">
      <div class="icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#c0392b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6"/>
          <path d="M19 6l-1 14H6L5 6"/>
          <path d="M10 11v6M14 11v6"/>
          <path d="M9 6V4h6v2"/>
        </svg>
      </div>

      <h1>Excluir livro?</h1>
      <p>Você está prestes a excluir permanentemente:</p>
      <div class="livro-nome">"{{ livro.livro }}"</div>

      <div class="divider"></div>

      <div class="btn-row">
        <a href="{% url 'lista_livros' %}" class="btn btn-cancelar">Cancelar</a>
        <form method="post" style="flex:1;">
          {% csrf_token %}
          <button type="submit" class="btn btn-confirmar" style="width:100%;">Sim, excluir</button>
        </form>
      </div>
    </div>
  </div>
</body>
</html>
