{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{{ livro.livro }}</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f5f0;
      --surface: #ffffff;
      --border: #e8e4db;
      --accent: #2c5f2e;
      --accent-lt: #eef4ee;
      --red: #c0392b;
      --red-lt: #fdf0ee;
      --text: #1a1a18;
      --muted: #888680;
      --radius: 12px;
      --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
    }

    .wrapper {
      width: 100%;
      max-width: 560px;
      animation: fadeUp 0.4s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.8rem;
      color: var(--muted);
      text-decoration: none;
      margin-bottom: 1.5rem;
      transition: color 0.2s;
    }

    .back-link:hover { color: var(--accent); }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem;
      box-shadow: var(--shadow);
    }

    .livro-header {
      display: flex;
      gap: 1.25rem;
      align-items: flex-start;
      margin-bottom: 1.5rem;
    }

    .livro-avatar {
      width: 60px;
      height: 60px;
      background: var(--accent-lt);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--accent);
      flex-shrink: 0;
    }

    .livro-titulo {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.2;
    }

    .livro-autor {
      font-size: 0.9rem;
      color: var(--muted);
      margin-top: 0.3rem;
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 1.25rem 0;
    }

    .info-label {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 0.4rem;
    }

    .info-value {
      font-size: 0.95rem;
      color: var(--text);
      line-height: 1.6;
      margin-bottom: 1.25rem;
    }

    .info-value.muted { color: var(--muted); font-style: italic; }

    .btn-row {
      display: flex;
      gap: 0.75rem;
      margin-top: 1.5rem;
    }

    .btn {
      flex: 1;
      padding: 0.75rem;
      border-radius: var(--radius);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      font-weight: 600;
      text-decoration: none;
      text-align: center;
      transition: all 0.2s;
      border: none;
      cursor: pointer;
    }

    .btn-editar { background: var(--accent-lt); color: var(--accent); }
    .btn-editar:hover { background: var(--accent); color: #fff; }

    .btn-deletar { background: var(--red-lt); color: var(--red); }
    .btn-deletar:hover { background: var(--red); color: #fff; }
  </style>
</head>
<body>
  <div class="wrapper">
    <a href="{% url 'lista_livros' %}" class="back-link">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      Voltar à biblioteca
    </a>

    <div class="card">
      <div class="livro-header">
        <div class="livro-avatar">{{ livro.livro|first|upper }}</div>
        <div>
          <div class="livro-titulo">{{ livro.livro }}</div>
          <div class="livro-autor">{{ livro.autor }}</div>
        </div>
      </div>

      <div class="divider"></div>

      <div class="info-label">Descrição</div>
      {% if livro.descricao %}
        <div class="info-value">{{ livro.descricao }}</div>
      {% else %}
        <div class="info-value muted">Sem descrição.</div>
      {% endif %}

      <div class="info-label">Cadastrado em</div>
      <div class="info-value">{{ livro.criada_em|date:"d/m/Y" }}</div>

      <div class="btn-row">
        <a href="{% url 'editar_livro' livro.slug %}" class="btn btn-editar">Editar</a>
        <a href="{% url 'deletar_livro' livro.slug %}" class="btn btn-deletar">Excluir</a>
      </div>
    </div>
  </div>
</body>
</html>
