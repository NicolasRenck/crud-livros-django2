{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login | Biblioteca</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f5f0;
      --surface: #ffffff;
      --border: #e8e4db;
      --accent: #2c5f2e;
      --text: #1a1a18;
      --muted: #888680;
      --danger: #c0392b;
      --radius: 12px;
      --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .wrapper {
      width: 100%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      gap: 2rem;
      animation: fadeUp 0.5s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .brand { text-align: center; }

    .brand-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 52px;
      height: 52px;
      background: var(--accent);
      border-radius: 14px;
      margin-bottom: 1rem;
      box-shadow: 0 4px 20px rgba(44,95,46,0.25);
    }

    .brand h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.9rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 0.25rem;
    }

    .brand h1 span { color: var(--accent); }
    .brand p { font-size: 0.85rem; color: var(--muted); }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem;
      box-shadow: var(--shadow);
    }

    .card h2 {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 1.5rem;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      margin-bottom: 1.1rem;
    }

    label {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.07em;
    }

    input {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      padding: 0.75rem 1rem;
      outline: none;
      width: 100%;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input::placeholder { color: var(--muted); }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(44,95,46,0.1);
      background: #fff;
    }

    .error {
      background: #fdf0ee;
      border: 1px solid #f0c4c0;
      border-radius: 8px;
      color: var(--danger);
      font-size: 0.85rem;
      padding: 0.65rem 0.9rem;
      margin-bottom: 1.25rem;
    }

    .btn {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      padding: 0.85rem;
      margin-top: 0.5rem;
      transition: all 0.2s;
    }

    .btn:hover {
      background: #234d25;
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(44,95,46,0.25);
    }

    .footer-link {
      text-align: center;
      font-size: 0.85rem;
      color: var(--muted);
      margin-top: 1.25rem;
    }

    .footer-link a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }

    .footer-link a:hover { color: #234d25; }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="brand">
      <div class="brand-icon">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
          <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
        </svg>
      </div>
      <h1>Minha <span>Biblioteca</span></h1>
      <p>Acesse sua conta para continuar</p>
    </div>

    <div class="card">
      <h2>Entrar</h2>

      {% if form.errors %}
        <div class="error">Usuário ou senha incorretos. Tente novamente.</div>
      {% endif %}

      <form method="post">
        {% csrf_token %}

        <div class="form-group">
          <label for="id_username">Usuário</label>
          <input type="text" name="username" id="id_username" placeholder="Digite seu usuário" autofocus required/>
        </div>

        <div class="form-group">
          <label for="id_password">Senha</label>
          <input type="password" name="password" id="id_password" placeholder="Digite sua senha" required/>
        </div>

        <button type="submit" class="btn">Entrar</button>
      </form>

      <div class="footer-link">
        Não tem conta? <a href="{% url 'registro' %}">Cadastre-se</a>
      </div>
    </div>
  </div>
</body>
</html>
